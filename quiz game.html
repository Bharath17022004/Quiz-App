<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="quiz.css" />
    <title>Document</title>
</head>

<body>
    <div class="container">
        <div class="screen-active" id="start-screen">
            <h2>Time For Quize</h2>
            <p>Test Your General Knowledge</p>
            <button type="button" id="start-btn" class="btns">Start Quiz</button>
        </div>

        <div class="screen" id="quiz-screen">
            <div class="quiz-header">
                <h2 id="question-text">Question Goes Here</h2>
                <div class="quiz-info">
                    <p>Question<span id="question-count">1</span>Of<span id="total-count">5</span></p>
                    <p>Score<span id="score"> 0 </span>Out of<span id="total-score"> 10 </span></p>

                </div>
                <div class="options">
                    <button type="button" class="choices">1</button>
                    <button type="button" class="choices">2</button>
                    <button type="button" class="choices">3</button>
                    <button type="button" class="choices">4</button>
                </div>
            </div>
        </div>
        <div class="answers-container" id="answers-container">
            <!--answers will be displayed here dynamically from js-->
        </div>
        <div class="progress-bar">
            <div class="progress" id="progress">
            </div>
        </div>
        <div id="result-screen" class="screen">
            <h2>Quiz Result</h2>
            <div class="result-info">
                <p>You Scored <span id="final-score"> 0 </span> Out of <span id="max-score"> 10 </span></p>
                <h3 id="result-message">Good Job</h3>
            </div>
            <button type="reset" id="restart-btn" class="btns">Restart Quiz</button>
        </div>
    </div>
    <script src="quiz.js"></script>
</body>

</html>
